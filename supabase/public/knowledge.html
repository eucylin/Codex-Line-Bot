<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知識庫管理 - 小清新</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .card h2 {
      color: #333;
      margin-bottom: 16px;
      font-size: 1.2rem;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    input[type="text"],
    input[type="password"],
    input[type="number"],
    select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
    }
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 120px;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .form-row {
      display: flex;
      gap: 16px;
    }
    .form-row .form-group {
      flex: 1;
    }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-sm {
      padding: 6px 14px;
      font-size: 12px;
    }
    .btn-danger {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    }
    .btn-danger:hover {
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4);
    }
    .btn-success {
      background: linear-gradient(135deg, #27ae60 0%, #219a52 100%);
    }
    .btn-success:hover {
      box-shadow: 0 4px 12px rgba(39, 174, 96, 0.4);
    }
    .btn-secondary {
      background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
    }
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .entry-list {
      margin-top: 16px;
    }
    .entry-item {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      transition: box-shadow 0.2s;
    }
    .entry-item:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .entry-item.disabled {
      opacity: 0.5;
      background: #f8f9fa;
    }
    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .entry-title {
      font-weight: 600;
      color: #333;
      font-size: 1rem;
    }
    .entry-category {
      background: #e8eaf6;
      color: #3f51b5;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      margin-left: 8px;
    }
    .entry-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .entry-content-preview {
      color: #666;
      font-size: 13px;
      margin-bottom: 8px;
      white-space: pre-wrap;
      max-height: 80px;
      overflow: hidden;
      line-height: 1.5;
    }
    .entry-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 24px;
      transition: 0.3s;
    }
    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: #667eea;
    }
    .toggle-switch input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }
    .stats-bar {
      display: flex;
      gap: 20px;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #555;
    }
    .stats-bar .stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stats-bar .warn {
      color: #e74c3c;
      font-weight: 600;
    }
    .result {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      display: none;
      font-size: 14px;
    }
    .result.success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
      display: block;
    }
    .result.error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
      display: block;
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      color: white;
      text-decoration: none;
      opacity: 0.8;
      margin: 0 12px;
    }
    .back-link a:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .hint {
      color: #888;
      font-size: 12px;
      margin-top: 6px;
    }
    #loading {
      display: none;
      text-align: center;
      padding: 20px;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 知識庫管理</h1>

    <!-- Auth Card -->
    <div class="card">
      <h2>🔑 驗證</h2>
      <div class="form-group">
        <label for="adminKey">Admin Key</label>
        <input type="password" id="adminKey" placeholder="請輸入管理員密鑰">
      </div>
      <button class="btn" onclick="loadEntries()">載入知識庫</button>
    </div>

    <!-- Add/Edit Form -->
    <div class="card" id="formCard" style="display:none;">
      <h2 id="formTitle">➕ 新增知識條目</h2>
      <input type="hidden" id="editId">
      <div class="form-group">
        <label for="entryTitle">標題 *</label>
        <input type="text" id="entryTitle" placeholder="例如：營業時間">
      </div>
      <div class="form-group">
        <label for="entryContent">內容 *</label>
        <textarea id="entryContent" placeholder="例如：週一至週五 9:00-18:00，週六日公休"></textarea>
        <p class="hint">此內容會注入到 AI 的 system prompt 中，讓小清新能參考回答</p>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="entryCategory">分類</label>
          <input type="text" id="entryCategory" placeholder="例如：基本資訊">
        </div>
        <div class="form-group">
          <label for="entrySortOrder">排序</label>
          <input type="number" id="entrySortOrder" value="0" min="0">
          <p class="hint">數字越小越前面</p>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn" id="saveBtn" onclick="saveEntry()">儲存</button>
        <button class="btn btn-secondary" onclick="resetForm()">取消</button>
      </div>
      <div id="formResult" class="result"></div>
    </div>

    <!-- Entry List -->
    <div class="card" id="listCard" style="display:none;">
      <h2>📋 知識條目列表</h2>
      <div id="statsBar" class="stats-bar"></div>
      <div id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 10px; color: #666;">載入中...</p>
      </div>
      <div id="entryList" class="entry-list"></div>
    </div>

    <div class="back-link">
      <a href="admin.html">← 匯入後台</a>
      <a href="index.html">← 統計頁面</a>
    </div>
  </div>

  <script>
    const API_BASE = "https://zycyybbmoxpuzbrlaoqx.supabase.co/functions/v1";
    let entries = [];

    function getAdminKey() {
      return document.getElementById("adminKey").value.trim();
    }

    async function apiCall(method, body = null) {
      const key = getAdminKey();
      if (!key) {
        showFormResult("error", "請先輸入 Admin Key");
        return null;
      }

      const opts = {
        method,
        headers: {
          "Content-Type": "application/json",
          "X-Admin-Key": key,
        },
      };
      if (body) opts.body = JSON.stringify(body);

      const res = await fetch(`${API_BASE}/admin-knowledge`, opts);
      return res.json();
    }

    async function loadEntries() {
      const key = getAdminKey();
      if (!key) {
        alert("請輸入 Admin Key");
        return;
      }

      document.getElementById("formCard").style.display = "block";
      document.getElementById("listCard").style.display = "block";
      document.getElementById("loading").style.display = "block";
      document.getElementById("entryList").innerHTML = "";

      try {
        const result = await apiCall("GET");
        if (result && result.success) {
          entries = result.data || [];
          renderEntries();
        } else {
          document.getElementById("entryList").innerHTML =
            '<div class="empty-state">載入失敗：' + (result?.error || "未知錯誤") + "</div>";
        }
      } catch (e) {
        document.getElementById("entryList").innerHTML =
          '<div class="empty-state">網路錯誤：' + e.message + "</div>";
      } finally {
        document.getElementById("loading").style.display = "none";
      }
    }

    function renderEntries() {
      const listEl = document.getElementById("entryList");
      const statsEl = document.getElementById("statsBar");

      // Calculate stats
      const totalEntries = entries.length;
      const enabledEntries = entries.filter((e) => e.enabled).length;
      const totalChars = entries
        .filter((e) => e.enabled)
        .reduce((sum, e) => sum + e.title.length + e.content.length, 0);
      const isOverLimit = totalChars > 2500;

      statsEl.innerHTML = `
        <span class="stat">總條目：<strong>${totalEntries}</strong></span>
        <span class="stat">已啟用：<strong>${enabledEntries}</strong></span>
        <span class="stat ${isOverLimit ? "warn" : ""}">
          啟用字元數：<strong>${totalChars}</strong>
          ${isOverLimit ? "（超過 2500 字，可能影響回應品質與成本）" : ""}
        </span>
      `;

      if (entries.length === 0) {
        listEl.innerHTML = '<div class="empty-state">目前沒有任何知識條目，請新增一筆試試看</div>';
        return;
      }

      listEl.innerHTML = entries
        .map(
          (entry) => `
        <div class="entry-item ${entry.enabled ? "" : "disabled"}">
          <div class="entry-header">
            <div>
              <span class="entry-title">${escapeHtml(entry.title)}</span>
              ${entry.category ? '<span class="entry-category">' + escapeHtml(entry.category) + "</span>" : ""}
            </div>
            <div class="entry-meta">
              <span style="font-size:12px;color:#999;">${entry.title.length + entry.content.length} 字</span>
              <span style="font-size:12px;color:#999;">排序: ${entry.sort_order}</span>
            </div>
          </div>
          <div class="entry-content-preview">${escapeHtml(entry.content)}</div>
          <div class="entry-actions">
            <label class="toggle-switch" title="${entry.enabled ? "停用" : "啟用"}">
              <input type="checkbox" ${entry.enabled ? "checked" : ""} onchange="toggleEntry(${entry.id}, this.checked)">
              <span class="toggle-slider"></span>
            </label>
            <button class="btn btn-sm" onclick="editEntry(${entry.id})">編輯</button>
            <button class="btn btn-sm btn-danger" onclick="deleteEntry(${entry.id}, '${escapeHtml(entry.title)}')">刪除</button>
          </div>
        </div>
      `
        )
        .join("");
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function resetForm() {
      document.getElementById("editId").value = "";
      document.getElementById("entryTitle").value = "";
      document.getElementById("entryContent").value = "";
      document.getElementById("entryCategory").value = "";
      document.getElementById("entrySortOrder").value = "0";
      document.getElementById("formTitle").textContent = "➕ 新增知識條目";
      document.getElementById("formResult").style.display = "none";
    }

    function editEntry(id) {
      const entry = entries.find((e) => e.id === id);
      if (!entry) return;

      document.getElementById("editId").value = entry.id;
      document.getElementById("entryTitle").value = entry.title;
      document.getElementById("entryContent").value = entry.content;
      document.getElementById("entryCategory").value = entry.category || "";
      document.getElementById("entrySortOrder").value = entry.sort_order;
      document.getElementById("formTitle").textContent = "✏️ 編輯知識條目";
      document.getElementById("formCard").scrollIntoView({ behavior: "smooth" });
    }

    async function saveEntry() {
      const editId = document.getElementById("editId").value;
      const title = document.getElementById("entryTitle").value.trim();
      const content = document.getElementById("entryContent").value.trim();
      const category = document.getElementById("entryCategory").value.trim();
      const sort_order = parseInt(document.getElementById("entrySortOrder").value) || 0;

      if (!title || !content) {
        showFormResult("error", "標題和內容為必填欄位");
        return;
      }

      document.getElementById("saveBtn").disabled = true;

      try {
        let result;
        if (editId) {
          result = await apiCall("PUT", { id: parseInt(editId), title, content, category: category || null, sort_order });
        } else {
          result = await apiCall("POST", { title, content, category: category || null, sort_order });
        }

        if (result && result.success) {
          showFormResult("success", editId ? "條目已更新" : "條目已新增");
          resetForm();
          await loadEntries();
        } else {
          showFormResult("error", result?.error || "操作失敗");
        }
      } catch (e) {
        showFormResult("error", "網路錯誤：" + e.message);
      } finally {
        document.getElementById("saveBtn").disabled = false;
      }
    }

    async function toggleEntry(id, enabled) {
      try {
        const result = await apiCall("PUT", { id, enabled });
        if (result && result.success) {
          await loadEntries();
        }
      } catch (e) {
        console.error("Toggle error:", e);
        await loadEntries();
      }
    }

    async function deleteEntry(id, title) {
      if (!confirm(`確定要刪除「${title}」嗎？此操作無法復原。`)) return;

      try {
        const result = await apiCall("DELETE", { id });
        if (result && result.success) {
          await loadEntries();
        } else {
          alert("刪除失敗：" + (result?.error || "未知錯誤"));
        }
      } catch (e) {
        alert("網路錯誤：" + e.message);
      }
    }

    function showFormResult(type, message) {
      const el = document.getElementById("formResult");
      el.className = "result " + type;
      el.textContent = message;
      el.style.display = "block";
      setTimeout(() => {
        el.style.display = "none";
      }, 3000);
    }
  </script>
</body>
</html>
